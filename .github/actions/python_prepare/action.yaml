name: "Prepare Python environment"
description: "Set up Python and install dependencies"
runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Python 3.11
      shell: bash
      run: uv python install 3.11
    - name: Install dependencies
      shell: bash
      run: uv sync
